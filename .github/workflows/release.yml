name: 建立 Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: '版本號碼（例如 v1.0）'
        required: true
        default: 'v1.0'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: 取得原始碼
        uses: actions/checkout@v4

      - name: 決定版本號碼
        id: get_tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: 建立 GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ steps.get_tag.outputs.tag }}';
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `數學冒險樂園 ${tag}`,
              body: [
                '## 🎮 數學冒險樂園 ' + tag,
                '',
                '### ▶️ 立即線上遊玩',
                '',
                '👉 **[點此開始玩 → https://xing1217.github.io/math-fun-kids/](https://xing1217.github.io/math-fun-kids/)**',
                '',
                '---',
                '',
                '### 🌟 本版本功能',
                '',
                '- 加減法闖關（1～3 位數，自動升等）',
                '- 九九乘法練習',
                '- 背景音樂（BGM）與音效開關',
                '- 成就徽章系統（6 枚）',
                '- 本機排行榜（localStorage，前 5 名）',
                '- 全程正體中文介面',
                '',
                '---',
                '',
                '> 無須安裝，點開網址即可直接遊玩！',
              ].join('\n'),
              draft: false,
              prerelease: false,
            });
