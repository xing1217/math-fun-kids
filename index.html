<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數學冒險樂園｜國小 1-3 年級</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <h1>🎯 數學冒險樂園</h1>
        <p class="subtitle">適合國小 1-3 年級｜開啟網頁就能直接玩</p>

        <section id="game">
            <div class="toolbar">
                <button id="switch-mode">切換到九九乘法</button>
                <button id="toggle-sound">🔊 音效：開</button>
                <button id="toggle-bgm">🎵 背景音樂：開</button>
                <p class="mode-info">目前模式：<span id="mode-label">加減法闖關（1~3 位數）</span></p>
            </div>

            <div id="score-board" class="panel">
                <p>分數：<span id="score">0</span></p>
                <p>等級：<span id="level">1</span></p>
                <p>連續答對：<span id="streak">0</span></p>
                <p>星星：<span id="stars">0</span> ⭐</p>
            </div>

            <div id="story-panel" class="panel">
                <h2>🗺️ RPG 冒險劇情</h2>
                <p id="story-title">序章：新手村出發</p>
                <p id="story-desc">你是數學小勇者，答對題目就能推進冒險！</p>
                <p id="story-progress">任務進度：再答對 4 題可前往史萊姆草原</p>
            </div>

            <div class="actions">
                <button id="start-game">開始遊戲</button>
                <button id="next-question">下一題</button>
                <button id="toggle-auto-next">⏭️ 自動下一題：開</button>
                <button id="reset">重設進度</button>
            </div>

            <div id="question-area" class="panel">
                <p id="question">按下「開始遊戲」後會出題</p>
                <input type="text" id="answer" placeholder="請輸入答案" inputmode="numeric" pattern="[0-9]*" aria-label="答案輸入框">
                <button id="submit-answer">提交答案</button>
                <div id="touch-keypad" class="touch-keypad" aria-label="觸控數字鍵盤">
                    <button type="button" data-key="1">1</button>
                    <button type="button" data-key="2">2</button>
                    <button type="button" data-key="3">3</button>
                    <button type="button" data-key="4">4</button>
                    <button type="button" data-key="5">5</button>
                    <button type="button" data-key="6">6</button>
                    <button type="button" data-key="7">7</button>
                    <button type="button" data-key="8">8</button>
                    <button type="button" data-key="9">9</button>
                    <button type="button" data-key="clear">清空</button>
                    <button type="button" data-key="0">0</button>
                    <button type="button" data-key="backspace">刪除</button>
                </div>
            </div>

            <div id="feedback-area" class="panel feedback">
                <p id="feedback">準備好就開始挑戰吧！</p>
            </div>

            <div id="badge-panel" class="panel">
                <h2>🏅 成就徽章</h2>
                <p id="badge-hint">達成條件就能解鎖徽章！</p>
                <ul id="badge-list" class="badge-list"></ul>
            </div>

            <div id="leaderboard-panel" class="panel">
                <h2>🏆 本機排行榜（前 5 名）</h2>
                <div class="leaderboard-actions">
                    <input type="text" id="player-name" placeholder="請輸入玩家名稱（最多 12 字）" maxlength="12" aria-label="玩家名稱輸入框">
                    <button id="save-score">儲存目前分數</button>
                </div>
                <p id="leaderboard-hint">每次儲存會記錄目前分數、星星與模式。</p>
                <ol id="leaderboard-list"></ol>
            </div>

            <div id="fx-layer" aria-hidden="true"></div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
